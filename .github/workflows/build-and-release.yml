env:
  DOCMAKER_GITHUB_TOKEN: ${{ secrets.DOCMAKER_GITHUB_TOKEN }}

name: Skew Distributions CI

on:
  push:
    branches:
      - main
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    outputs:
      tests_passed: ${{ steps.run-tests.outcome == 'success' }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up MATLAB
        uses: matlab-actions/setup-matlab@v3
        with:
          products: Statistics_and_Machine_Learning_Toolbox

      - name: Run buildtool test
        id: run-tests
        continue-on-error: true
        uses: matlab-actions/run-build@v3
        with:
          tasks: test

      - name: Upload Pages artifact
        if: always()
        uses: actions/upload-pages-artifact@v5
        with:
          path: public/

      - name: Run buildtool archive
        uses: matlab-actions/run-build@v3
        with:
          tasks: archive
          build-options: -skip test

      - name: Upload toolbox artifact
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v7
        with:
          name: skewdists-mltbx
          path: releases/skewdists.mltbx
          if-no-files-found: error

  release:
    needs:
      - test
    if: startsWith(github.ref, 'refs/tags/') && needs.test.outputs.tests_passed == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Download toolbox artifact
        uses: actions/download-artifact@v8
        with:
          name: skewdists-mltbx
          path: releases

      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          files: releases/skewdists.mltbx
          fail_on_unmatched_files: true
          generate_release_notes: true

  deploy-pages:
    needs: test
    if: always()
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    concurrency:
      group: pages
      cancel-in-progress: false
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

  fail-on-test-failure:
    needs:
      - test
      - deploy-pages
    if: always() && needs.test.outputs.tests_passed != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Mark workflow as failed after Pages deploy
        shell: bash
        run: |
          echo "Tests failed. Pages were published, and release steps were skipped."
          exit 1
